<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" viewBox="0 0 128 128" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f5576c"/>
            <stop offset="33%" stop-color="#7c3aed"/>
            <stop offset="66%" stop-color="#2563eb"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#iconGrad)"/>
        <rect x="50" y="36" width="28" height="12" rx="4" fill="#fff" fill-opacity="0.94"/>
        <rect x="32" y="44" width="64" height="42" rx="10" fill="#fff" fill-opacity="0.94"/>
        <circle cx="64" cy="64" r="14" fill="#1a1a2e"/>
        <circle cx="64" cy="64" r="9" fill="#06b6d4"/>
        <circle cx="60" cy="60" r="3" fill="#fff" fill-opacity="0.7"/>
        <circle cx="86" cy="50" r="3" fill="#f5576c"/>
      </svg>
      <h1>Screenshot Pro</h1>
    </div>

    <div class="mode-toggle">
      <span class="mode-label">Output</span>
      <div class="toggle-group">
        <button id="modeDownload" class="toggle-btn active">⬇ Download</button>
        <button id="modePreview" class="toggle-btn">👁 Preview</button>
      </div>
    </div>

    <div class="actions">
      <button id="captureVisible" class="action-btn">
        <span class="action-icon icon-visible">🖥️</span>
        <div class="action-text">
          <span class="action-title">Visible Area</span>
          <span class="action-desc">Capture current viewport</span>
        </div>
      </button>

      <button id="captureFull" class="action-btn">
        <span class="action-icon icon-full">📄</span>
        <div class="action-text">
          <span class="action-title">Full Page</span>
          <span class="action-desc">Capture entire scrollable page</span>
        </div>
      </button>

      <button id="captureArea" class="action-btn">
        <span class="action-icon icon-area">✂️</span>
        <div class="action-text">
          <span class="action-title">Selected Area</span>
          <span class="action-desc">Drag to select a region</span>
        </div>
      </button>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
