<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screenshot Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #16213e;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .toolbar-title {
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
    }

    .toolbar-left {
      gap: 10px;
    }

    .toolbar-info {
      color: #8892b0;
      font-size: 13px;
    }

    .btn-download {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      background: #4285f4;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-download:hover {
      background: #3367d6;
    }

    .btn-download:active {
      background: #2a5cb8;
    }

    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 24px;
    }

    .preview-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .loading {
      color: #8892b0;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <svg viewBox="0 0 128 128" width="24" height="24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <defs>
          <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f5576c"/>
            <stop offset="33%" stop-color="#7c3aed"/>
            <stop offset="66%" stop-color="#2563eb"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#iconGrad2)"/>
        <rect x="50" y="36" width="28" height="12" rx="4" fill="#fff" fill-opacity="0.94"/>
        <rect x="32" y="44" width="64" height="42" rx="10" fill="#fff" fill-opacity="0.94"/>
        <circle cx="64" cy="64" r="14" fill="#1a1a2e"/>
        <circle cx="64" cy="64" r="9" fill="#06b6d4"/>
        <circle cx="60" cy="60" r="3" fill="#fff" fill-opacity="0.7"/>
        <circle cx="86" cy="50" r="3" fill="#f5576c"/>
      </svg>
      <span class="toolbar-title">Screenshot Preview</span>
      <span id="info" class="toolbar-info"></span>
    </div>
    <button id="download" class="btn-download">⬇ Download PNG</button>
  </div>
  <div class="preview-area">
    <span id="loading" class="loading">Loading screenshot…</span>
    <img id="preview" style="display:none" />
  </div>
  <script src="preview.js"></script>
</body>
</html>
