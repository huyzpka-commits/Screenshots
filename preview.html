<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screenshot Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #16213e;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .toolbar-title {
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
    }

    .toolbar-info {
      color: #8892b0;
      font-size: 13px;
    }

    .btn-download {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      background: #4285f4;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-download:hover {
      background: #3367d6;
    }

    .btn-download:active {
      background: #2a5cb8;
    }

    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 24px;
    }

    .preview-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .loading {
      color: #8892b0;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">📸 Screenshot Preview</span>
      <span id="info" class="toolbar-info"></span>
    </div>
    <button id="download" class="btn-download">⬇ Download PNG</button>
  </div>
  <div class="preview-area">
    <span id="loading" class="loading">Loading screenshot…</span>
    <img id="preview" style="display:none" />
  </div>
  <script src="preview.js"></script>
</body>
</html>
